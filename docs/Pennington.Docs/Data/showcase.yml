# Showcase data — rendered by Components/Showcase.razor via <Showcase Source="Data/showcase.yml" />.
# Each entry's `description` and `notable` support inline `code` spans.
entries:
  - name: "MonorailCSS"
    url: "monorailcss.github.io/MonorailCss.Framework"
    href: "https://monorailcss.github.io/MonorailCss.Framework/"
    screenshot: "/showcase/monorailcss.png"
    screenshotDark: "/showcase/monorailcss-dark.png"
    description: >-
      A Tailwind-compatible JIT CSS engine written in pure C# — and the engine that
      styles Pennington itself. Hand it utility class names and it compiles exactly
      the CSS they need, in-process and npm-free: oklch theme palettes, custom
      variants, arbitrary `[values]`, and tailwind-style conflict resolution. Its
      docs are the compiler documenting itself.
    notable: >-
      A custom `IContentService` reflects over the engine's own documentation model to
      publish 169 utility-reference pages — and each one compiles its example CSS live,
      through a real `CssFramework` instance, at render time.
    chips:
      - "Custom IContentService"
      - "Self-documenting"
      - "oklch theme palettes"
      - ":symbol code fences"
      - "Split llms.txt subtree"

  - name: "Spectre.Console"
    url: "spectreconsole.net"
    href: "https://spectreconsole.net/"
    screenshot: "/showcase/spectre-console.png"
    screenshotDark: "/showcase/spectre-console-dark.png"
    description: >-
      Documentation for Spectre.Console, the library for rich cross-platform .NET
      console apps — tables, trees, prompts, live progress, and markup. The site skips
      the packaged template and is built straight on `AddPennington`: one bespoke Blazor
      host wiring three markdown sources, each with its own front-matter type. It is the
      deepest custom integration here — nearly every Pennington seam, exercised at once.
    notable: >-
      A single widget page fuses three features at once — a VCR#-recorded terminal SVG,
      source pulled live from a sibling project through a `:symbol` fence, and a
      reflection-generated API table rendered by an embedded Mdazor component.
    chips:
      - "Raw AddPennington host"
      - ":symbol source linking"
      - "Reflection API tables"
      - "Mdazor components"
      - "VCR# terminal SVGs"

  - name: "Pennington"
    url: "usepennington.github.io/pennington"
    href: "https://usepennington.github.io/pennington/"
    screenshot: "/showcase/pennington.png"
    screenshotDark: "/showcase/pennington-dark.png"
    description: >-
      Pennington's own documentation, generated by the pipeline it documents — markdown
      in, a fast static docs-and-blog site out, styled with MonorailCSS. The reference
      build: one DocSite host dogfooding tree-sitter source fences, a reflection-driven
      API reference, per-area PDF books, and a hand-tuned grape OKLCH palette.
    notable: >-
      Code samples are never pasted. `:symbol` fences embed real source by name-path at
      build time — 212 of them across 68 pages, resolved against the repo root — so every
      quoted snippet stays in lockstep with the file it came from.
    chips:
      - "DocSite template"
      - ":symbol code fences"
      - "Reflection API reference"
      - "Per-area PDF books"
      - "Ctrl-K search"

  - name: "Ashcroft"
    url: "usepennington.github.io/ashcroft"
    href: "https://usepennington.github.io/ashcroft/"
    screenshot: "/showcase/ashcroft.png"
    description: >-
      Ashcroft generates Open Graph images, X cards, and blog headers from a small C#
      API: set a background, describe the content, pin it to one of nine anchors, save.
      SkiaSharp draws it and HarfBuzz shapes every string — real kerning, honest wrapping,
      shrink-to-fit before ellipsis, emoji and CJK fallback — with an automatic legibility
      scrim behind text over photos.
    notable: >-
      Nothing on the docs page is a screenshot. Each example shows its C# source through a
      `:symbol` fence, while the image beside it is rendered by running that exact method
      through a `/samples/{id}.png` endpoint wired into Pennington's content discovery —
      even the page's own `og:image`.
    chips:
      - "csharp:symbol source"
      - "Custom IContentService"
      - "Self-rendered og:image"
      - "SkiaSharp + HarfBuzz"
      - "Code shown == code run"

  - name: "VCR#"
    url: "phil-scott-78.github.io/vcr"
    href: "https://phil-scott-78.github.io/vcr/"
    screenshot: "/showcase/vcr.png"
    screenshotDark: "/showcase/vcr-dark.png"
    description: >-
      A browserless .NET terminal recorder: it turns `.tape` scripts into SVGs, GIFs, and
      videos by driving a real shell over an in-process pseudo-terminal and rendering
      frames with a from-scratch VT500 engine — no ttyd, no Chromium, and SVG output needs
      no external binaries at all. The docs are a near-stock DocSite that earn their polish
      by dogfooding the tool: every embedded recording is an SVG VCR# made from its own
      sample tapes.
    notable: >-
      The whole site is essentially one `AddDocSite` call — but it slots in a custom
      `ICodeHighlighter` at priority 60, above the built-in TextMate highlighter and below
      shell, to syntax-color the `.tape` language with a hand-written TextMate grammar.
    chips:
      - "One AddDocSite call"
      - "Custom tape highlighter"
      - "VcrTape component"
      - "Self-rendered SVG demos"
      - "Diataxis four areas"

  - name: "Thirty25"
    url: "thirty25.blog"
    href: "https://thirty25.blog/"
    screenshot: "/showcase/thirty25.png"
    screenshotDark: "/showcase/thirty25-dark.png"
    description: >-
      Phil Scott's personal dev blog, and the gallery's lone BlogSite — a single
      `AddBlogSite()` call that wires the homepage hero, a project list, and social links,
      plus RSS, a sitemap, and tag browsing. Posts are dated Markdown carrying tags,
      series, and a repository link in front matter.
    notable: >-
      It hands Pennington's `SocialCardOptions.Render` hook a SkiaSharp + HarfBuzz canvas,
      minting a 1200x630 OpenGraph card for every post — title, description, and date drawn
      over a gradient-faded background image.
    chips:
      - "AddBlogSite template"
      - "SkiaSharp social cards"
      - "Custom GBNF highlighter"
      - ":symbol from projects"
      - "RSS + tags + series"
