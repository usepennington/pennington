# Pennington tool sample — blog site.
template = "blog"

[site]
title = "Sample Blog"
description = "A blog served by the pennington tool from a pennington.toml file."
canonical_base_url = "https://example.com"
content_root = "Content"

[blog]
content_path = "Blog"
base_url = "/blog"
posts_per_page = 10
author_name = "Sample Author"
author_bio = "Writing about software, tools, and the occasional side project."
enable_rss = true
enable_sitemap = true
