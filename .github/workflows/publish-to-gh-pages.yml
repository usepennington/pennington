name: Build and publish to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

env:
  ASPNETCORE_ENVIRONMENT: Production
  WEBAPP_PATH: ./docs/Pennington.Docs/
  WEBAPP_CSPROJ: Pennington.Docs.csproj
  GITHUB_REPOSITORY: "/pennington/"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet
          key: ${{ runner.os }}-dotnet-${{ hashFiles('**/*.csproj', '**/global.json', '**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-dotnet-

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            11.0.x

      - name: Build docs site to static output
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: true
        run: |
          dotnet build -c Release
          dotnet run --project ${{ env.WEBAPP_PATH }} --configuration Release --no-build -- build ${{ env.GITHUB_REPOSITORY }}

      - name: Install minify
        run: |
          curl -sfL https://github.com/tdewolff/minify/releases/latest/download/minify_linux_amd64.tar.gz | tar -xzf - -C /tmp
          sudo mv /tmp/minify /usr/local/bin/

      - name: Minify CSS and JavaScript
        run: |
          find "${{ env.WEBAPP_PATH }}output" -type f -name "*.css" -exec /usr/local/bin/minify -o {} {} \;
          find "${{ env.WEBAPP_PATH }}output" -type f -name "*.js"  -exec /usr/local/bin/minify -o {} {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Add .nojekyll
        run: touch ${{ env.WEBAPP_PATH }}output/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.WEBAPP_PATH }}output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
