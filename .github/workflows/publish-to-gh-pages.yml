name: Build and publish to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  ASPNETCORE_ENVIRONMENT: Production
  WEBAPP_PATH: ./docs/Pennington.Docs/
  WEBAPP_CSPROJ: Pennington.Docs.csproj
  GITHUB_REPOSITORY: "/pennington/"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet
          key: ${{ runner.os }}-dotnet-${{ hashFiles('**/*.csproj', '**/global.json', '**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-dotnet-

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            11.0.x

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build docs site to static output
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: true
        run: |
          dotnet build -c Release
          dotnet run --project ${{ env.WEBAPP_PATH }} --configuration Release --no-build -- build ${{ env.GITHUB_REPOSITORY }}

      - name: Tree-shake CSS with PurgeCSS
        run: |
          CSS="${{ env.WEBAPP_PATH }}output/styles.css"
          before=$(wc -c < "$CSS")
          npx --yes purgecss@7 --config purgecss.config.cjs --output ${{ env.WEBAPP_PATH }}output/
          after=$(wc -c < "$CSS")
          echo "styles.css: $before -> $after bytes ($(( (before - after) * 100 / before ))% removed)"

      - name: Verify purged CSS retains runtime-toggled rules
        run: |
          CSS="${{ env.WEBAPP_PATH }}output/styles.css"
          for needle in ':where(.dark' 'mobile-menu-open' '@keyframes'; do
            grep -qF "$needle" "$CSS" || {
              echo "::error::PurgeCSS dropped '$needle' — a runtime-toggled style would break. Update the safelist in purgecss.config.cjs."
              exit 1
            }
          done
          echo "purged styles.css retains dark-mode, mobile-menu and keyframe rules"

      - name: Install minify
        run: |
          curl -sfL https://github.com/tdewolff/minify/releases/latest/download/minify_linux_amd64.tar.gz | tar -xzf - -C /tmp
          sudo mv /tmp/minify /usr/local/bin/

      - name: Minify CSS and JavaScript
        run: |
          find "${{ env.WEBAPP_PATH }}output" -type f -name "*.css" -exec /usr/local/bin/minify -o {} {} \;
          find "${{ env.WEBAPP_PATH }}output" -type f -name "*.js"  -exec /usr/local/bin/minify -o {} {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Add .nojekyll
        run: touch ${{ env.WEBAPP_PATH }}output/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.WEBAPP_PATH }}output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
