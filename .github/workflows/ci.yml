name: ci

on:
  push:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/Pennington.Docs/Content/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/Pennington.Docs/Content/**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            11.0.x

      - name: Build
        run: dotnet build Pennington.slnx -c Release

      - name: Install Playwright
        shell: pwsh
        run: tests/Pennington.IntegrationTests/bin/Release/net11.0/playwright.ps1 install chromium --with-deps

      - name: Test
        run: dotnet test Pennington.slnx -c Release --no-build

      - name: Pack
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack Pennington.slnx -c Release --no-build -o ./artifacts

      - name: Upload packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: ./artifacts/*.*nupkg
          retention-days: 7

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: ./artifacts

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            11.0.x

      - uses: nuget/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        shell: bash
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          for pkg in ./artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json
          done
