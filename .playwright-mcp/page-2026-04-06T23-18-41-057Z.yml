                      - generic [ref=e284]: /// Front matter for doc site pages.
                      - generic [ref=e285]: /// </summary>
                      - generic [ref=e286]: "public record DocSiteFrontMatter : IFrontMatter, IDraftable, ITaggable,"
                      - generic [ref=e287]: ISectionable, ICrossReferenceable, IOrderable, IDescribable, IRedirectable
