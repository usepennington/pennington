                      - code [ref=e274]: DocSiteFrontMatter
                      - text: type ships with
                      - code [ref=e275]: Penn.DocSite
                      - text: and covers the common cases — title, description, ordering, tags, drafts, sections, UIDs for cross-referencing, and redirects.
                    - paragraph [ref=e276]: "Here's what it looks like:"
                    - code [ref=e281]:
