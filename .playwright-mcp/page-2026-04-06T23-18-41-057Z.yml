            - main [ref=e237]:
              - paragraph [ref=e238]: Penn is opinionated, inflexible, and sufficient to the purpose. It will not try to be everything to everyone. It will, however, build you a perfectly serviceable content site with minimal ceremony — and that's what we're doing here.
              - paragraph [ref=e239]: By the end of this tutorial, you'll have a working site that serves markdown content in dev mode and generates static HTML when you ask nicely.
              - heading "What You'll Build" [level=2] [ref=e240]
              - paragraph [ref=e241]: "A documentation-style site with:"
              - list [ref=e242]:
                - listitem [ref=e243]: Markdown content rendered to pages
                - listitem [ref=e244]: YAML front matter for metadata
                - listitem [ref=e245]: Live reload in development
                - listitem [ref=e246]: Static output for deployment
              - heading "Prerequisites" [level=2] [ref=e247]
              - list [ref=e248]:
                - listitem [ref=e249]: .NET 11 SDK or later
                - listitem [ref=e250]: A code editor you have opinions about
                - listitem [ref=e251]: A terminal
              - generic [ref=e252]:
                - generic [ref=e253]:
                  - text: "## Create a New Project"
                  - paragraph [ref=e254]: Start with an empty ASP.NET project. Penn doesn't need Blazor templates or MVC scaffolding — it brings what it needs.
                  - code [ref=e259]:
                    - generic [ref=e260]: dotnet new web -n MyDocsSite
                    - generic [ref=e261]: cd MyDocsSite
                - generic [ref=e262]:
                  - text: "## Add Penn.DocSite"
