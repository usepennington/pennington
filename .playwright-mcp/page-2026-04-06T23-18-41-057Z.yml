                    - text: Penn ships as a few focused packages.
                    - code [ref=e264]: Penn.DocSite
                    - text: is the batteries-included option for documentation sites — it pulls in the core engine, UI components, and a MonorailCSS-based design.
                  - code [ref=e269]:
                    - generic [ref=e270]: dotnet add package Penn.DocSite --prerelease
                  - paragraph [ref=e271]: One package. One line. Penn has opinions about what you need, and this is most of it.
                  - generic [ref=e272]:
