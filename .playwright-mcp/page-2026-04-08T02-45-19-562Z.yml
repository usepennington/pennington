        - generic [ref=e34]:
          - heading "About 937 Yoga" [level=1] [ref=e35]
          - paragraph [ref=e36]: Our story, our values, and why we do what we do.
        - generic [ref=e37]:
          - heading "Our Story" [level=2] [ref=e38]
          - paragraph [ref=e39]: 937 Yoga was born in 2019 in a converted warehouse on Elm Street — house number 937. What started as Maya Chen's personal teaching space with room for eight mats has grown into Portland's most welcoming yoga community.
          - paragraph [ref=e40]: "We kept the name because it reminds us where we started: small, personal, real."
          - heading "Our Philosophy" [level=2] [ref=e41]
          - paragraph [ref=e42]: We believe yoga belongs to everyone. Not just the flexible, the athletic, or the Instagram-ready. Every body that walks through our door deserves to feel supported, challenged, and seen.
          - paragraph [ref=e43]: Our teaching is rooted in tradition but not stuck in it. We honor the lineages that brought yoga to the West while making space for modern bodies, modern stress, and modern science.
          - heading "What Makes Us Different" [level=2] [ref=e44]
          - paragraph [ref=e45]:
            - strong [ref=e46]: No mirrors.
            - text: We removed them on day one. Your practice should be felt, not watched.
          - paragraph [ref=e47]:
            - strong [ref=e48]: Real community.
            - text: We know our students' names. We celebrate their milestones. We show up for each other.
          - paragraph [ref=e49]:
            - strong [ref=e50]: Evidence-based teaching.
            - text: Our instructors study anatomy, physiology, and current research. Ancient wisdom, modern understanding.
          - paragraph [ref=e51]:
            - strong [ref=e52]: Accessible pricing.
            - text: Because financial barriers shouldn't keep anyone from the mat. See our
            - link "pricing page" [ref=e53] [cursor=pointer]:
              - /url: /pricing
            - text: for details.
          - heading "The Space" [level=2] [ref=e54]
          - paragraph [ref=e55]: "Three purpose-built studios in a light-filled, renovated building:"
          - list [ref=e56]:
            - listitem [ref=e57]:
              - strong [ref=e58]: Main Studio
              - text: — Our largest room (30 mats). Bamboo floors, 14-foot ceilings, natural light.
            - listitem [ref=e59]:
              - strong [ref=e60]: Hot Room
              - text: — Climate-controlled space for heated classes. Radiant floor heating, proper ventilation.
            - listitem [ref=e61]:
              - strong [ref=e62]: Zen Room
              - text: — Our quiet space for yin, restorative, and meditation. Dimmed lights, sound-dampened walls.
          - paragraph [ref=e63]: Plus a comfortable lobby with tea, filtered water, and changing rooms with showers.
