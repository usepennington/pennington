            - heading "Connecting to Roslyn" [level=1] [ref=e236]
            - main [ref=e237]:
              - paragraph [ref=e238]: "Here's the problem with code samples in documentation: they lie. You write them once, the API evolves, and now your docs show code that doesn't compile. Nobody notices until a user copies it, pastes it, and files an issue titled \"your example doesn't work.\""
              - paragraph [ref=e239]: Penn.Roslyn fixes this by pulling code directly from your actual source files and compiled symbols. Your documentation references your real code, and when that code changes, the docs change with it. No copying, no pasting, no lying.
              - paragraph [ref=e240]:
                - text: In v2, Roslyn support is a
                - strong [ref=e241]: separate optional package
                - text: . Penn core handles markdown and content; Penn.Roslyn adds the ability to reach into your .NET solution and extract code by XML documentation ID or file path. You opt in only if you need it.
              - heading "What You'll Learn" [level=2] [ref=e242]
              - list [ref=e243]:
                - listitem [ref=e244]:
                  - text: Install and configure
                  - code [ref=e245]: Penn.Roslyn
                  - text: as a separate package
                - listitem [ref=e246]:
                  - text: Reference code symbols with
                  - code [ref=e247]: :xmldocid
                  - text: blocks
                - listitem [ref=e248]:
                  - text: Include entire source files with
                  - code [ref=e249]: :path
                  - text: blocks
                - listitem [ref=e250]:
                  - text: Show API evolution with
                  - code [ref=e251]: :xmldocid-diff
                  - text: blocks
              - heading "Prerequisites" [level=2] [ref=e252]
              - list [ref=e253]:
                - listitem [ref=e254]:
                  - text: Completed the
                  - link "Creating Your First Site" [ref=e255] [cursor=pointer]:
                    - /url: /getting-started/creating-first-site/
                  - text: tutorial
                - listitem [ref=e256]: A .NET solution with some code worth documenting
                - listitem [ref=e257]:
                  - text: Familiarity with
                  - link "XML documentation ID format" [ref=e258] [cursor=pointer]:
                    - /url: /reference/xmldocid-format/
                  - text: (the
                  - code [ref=e259]: "T:"
                  - text: ","
                  - code [ref=e260]: "M:"
                  - text: ","
                  - code [ref=e261]: "P:"
                  - text: prefixes)
              - generic [ref=e262]:
                - generic [ref=e263]:
                  - text: "## Install Penn.Roslyn"
                  - paragraph [ref=e264]: "Penn.Roslyn is its own NuGet package. This is deliberate — Roslyn adds a meaningful dependency footprint, and not every site needs live code extraction. Add it to your doc site project:"
                  - code [ref=e269]:
                    - generic [ref=e270]: dotnet add package Penn.Roslyn --prerelease
                - generic [ref=e271]:
                  - text: "## Configure Roslyn Integration"
                  - paragraph [ref=e272]:
                    - text: Update your
                    - code [ref=e273]: Program.cs
                    - text: to register Penn.Roslyn services. This is a separate call from
                    - code [ref=e274]: AddDocSite
                    - text: — it chains onto
                    - code [ref=e275]: builder.Services
                    - text: "directly:"
                  - code [ref=e280]: "using Penn.DocSite; using Penn.Roslyn; var builder = WebApplication.CreateBuilder(args); builder.Services.AddDocSite(() => new DocSiteOptions { SiteTitle = \"My Docs\", Description = \"A site about things\", SolutionPath = \"../../MySolution.slnx\", }); // Roslyn integration — separate package, separate registration builder.Services.AddPennRoslyn(roslyn => { roslyn.SolutionPath = \"../../MySolution.slnx\"; }); var app = builder.Build(); app.UseDocSite(); await app.RunDocSiteAsync(args);"
                  - paragraph [ref=e281]:
                    - text: The
                    - code [ref=e282]: SolutionPath
                    - text: points to your
                    - code [ref=e283]: .sln
                    - text: or
                    - code [ref=e284]: .slnx
                    - text: file, relative to your doc site project root. Penn.Roslyn loads the solution via the Roslyn workspace API, which gives it access to every type, method, and property in your codebase.
                  - paragraph [ref=e285]:
                    - text: Here's what
                    - code [ref=e286]: RoslynOptions
                    - text: "looks like:"
                  - code [ref=e291]:
                    - generic [ref=e292]: /// <summary>Configuration for Roslyn integration.</summary>
                    - text: "public sealed class RoslynOptions {"
                    - generic [ref=e293]: /// <summary>Path to .sln or .slnx file. If null, only basic highlighting is enabled.</summary>
                    - text: "public string? SolutionPath { get; set; }"
                    - generic [ref=e294]: /// <summary>Optional project filter.</summary>
                    - text: "public ProjectFilter? ProjectFilter { get; set; } }"
                  - paragraph [ref=e295]:
                    - text: The
                    - code [ref=e296]: ProjectFilter
                    - text: lets you narrow which projects get analyzed — useful if your solution has dozens of projects and you only document a few.
                  - generic [ref=e297]:
                    - text: "## Watch Source Code Changes"
                    - paragraph [ref=e298]:
                      - text: Since your documentation now depends on your source code, you'll want
                      - code [ref=e299]: dotnet watch
                      - text: to pick up changes in both. Update the
                      - code [ref=e300]: <Watch>
                      - text: items in your
                      - code [ref=e301]: .csproj
                      - text: ":"
                    - code [ref=e306]:
                      - generic [ref=e307]: <ItemGroup>
                      - generic [ref=e308]: <Watch Include="Content\**\*.*" />
                      - generic [ref=e309]: <Watch Include="..\..\src\**\*.cs" />
                      - generic [ref=e310]: </ItemGroup>
                    - paragraph [ref=e311]: The source path is relative to your project root, not the solution root. Adjust it to match where your source code lives relative to your doc site project. Exclude build artifacts by keeping the path specific to source directories.
                    - generic [ref=e312]:
                      - text: "## Use `:xmldocid` to Reference Code Symbols"
                      - paragraph [ref=e313]: This is where it gets good. Instead of pasting code into your markdown, you reference it by its XML documentation ID. Penn.Roslyn finds the symbol in your solution and renders the current source code.
                      - paragraph [ref=e314]:
                        - text: In your markdown, write a fenced code block with
                        - code [ref=e315]: :xmldocid
                        - text: "appended to the language:"
                      - code [ref=e320]: "```csharp:xmldocid T:Penn.Infrastructure.PennOptions ```"
                      - paragraph [ref=e321]:
                        - text: This renders the full source of the
                        - code [ref=e322]: PennOptions
                        - text: class, with Roslyn-powered syntax highlighting. When
                        - code [ref=e323]: PennOptions
                        - text: changes — new properties, renamed members, updated doc comments — your documentation reflects it automatically.
