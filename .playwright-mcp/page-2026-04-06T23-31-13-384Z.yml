                              - generic [ref=e467]: "## How It Works"
                              - generic [ref=e469]: "When Penn.Roslyn processes your markdown:"
                              - generic [ref=e471]: "1. It parses the language modifier (`:xmldocid`, `:path`, or `:xmldocid-diff`)"
                              - generic [ref=e472]: "2. For `:xmldocid`, it resolves the XML documentation ID against the loaded Roslyn workspace, extracts the syntax node, and highlights it"
                              - generic [ref=e473]: "3. For `:path`, it reads the file from disk relative to the solution root and highlights it"
                              - generic [ref=e474]: "4. For `:xmldocid-diff`, it extracts both symbols and runs a line-level diff algorithm"
                              - generic [ref=e476]: All of this happens at render time. In dev mode, changes to source files trigger a re-render. In build mode, it captures the state at build time.
                              - generic [ref=e478]: "## Best Practices"
                              - generic [ref=e480]: "- **Reference real code, not contrived examples.** The whole point is that your docs stay honest. If your examples live in an `examples/` project in your solution, reference those."
                              - generic [ref=e481]: "- **Use `ProjectFilter` for large solutions.** Roslyn loads every project by default. If your solution has 40 projects and you only document 3, filtering speeds things up noticeably."
                              - generic [ref=e482]: "- **Prefer `:xmldocid` over `:path` for types and methods.** Symbol-level extraction is more precise and survives file reorganization. Use `:path` for complete files like `Program.cs` where the whole file is the example."
