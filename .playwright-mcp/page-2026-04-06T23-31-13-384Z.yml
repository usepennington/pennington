                      - heading "Body-Only Mode" [level=3] [ref=e357]
                      - paragraph [ref=e358]:
                        - text: Sometimes you want just the implementation without the declaration boilerplate. Append
                        - code [ref=e359]: ",bodyonly"
                        - text: "to the modifier:"
                      - code [ref=e364]: "```csharp:xmldocid,bodyonly M:MyApp.Services.DataService.ProcessAsync ```"
                      - paragraph [ref=e365]: This strips the method signature and braces, showing only the body. Useful for walking through implementation details in a tutorial.
                      - heading "Multiple Symbols in One Block" [level=3] [ref=e366]
                      - paragraph [ref=e367]: "You can reference multiple symbols in a single code block — each on its own line:"
                      - code [ref=e372]: "```csharp:xmldocid T:Penn.FrontMatter.IDraftable T:Penn.FrontMatter.ITaggable T:Penn.FrontMatter.IOrderable ```"
                      - paragraph [ref=e373]: Penn.Roslyn extracts each symbol and renders them together, separated visually in the output. Handy for showing a family of related types.
                      - generic [ref=e374]:
                        - text: "## Use `:path` to Include Entire Files"
                        - paragraph [ref=e375]:
                          - text: Sometimes you want to show a complete file rather than a single symbol. The
                          - code [ref=e376]: :path
                          - text: "modifier includes a file from your solution by its path relative to the solution root:"
                        - code [ref=e381]: "```csharp:path docs/Penn.Docs/Program.cs ```"
                        - paragraph [ref=e382]:
                          - text: This pulls in the full contents of
                          - code [ref=e383]: Program.cs
                          - text: as it exists on disk, with syntax highlighting. It works for any file type that Penn can highlight —
                          - code [ref=e384]: .cs
                          - text: ","
                          - code [ref=e385]: .razor
                          - text: ","
                          - code [ref=e386]: .json
                          - text: ","
                          - code [ref=e387]: .xml
                          - text: ","
                          - code [ref=e388]: .yaml
                          - text: ", and more:"
                        - code [ref=e393]: "```yaml:path examples/MinimalExample/Content/index.md ```"
                        - paragraph [ref=e394]:
                          - text: The path is always relative to the solution directory (wherever your
                          - code [ref=e395]: .slnx
                          - text: or
                          - code [ref=e396]: .sln
                          - text: lives). No
                          - code [ref=e397]: ..
                          - text: traversal is allowed — Penn.Roslyn validates paths to prevent shenanigans.
                        - generic [ref=e398]:
                          - text: "## Use `:xmldocid-diff` to Show API Evolution"
                          - paragraph [ref=e399]:
                            - text: This one's genuinely useful for changelogs and migration guides. The
                            - code [ref=e400]: :xmldocid-diff
                            - text: "modifier takes two XML documentation IDs and renders a diff between them:"
                          - code [ref=e405]: "```csharp:xmldocid-diff T:Penn.FrontMatter.IFrontMatter T:Penn.FrontMatter.DocFrontMatter ```"
                          - paragraph [ref=e406]: Penn.Roslyn extracts both symbols, computes a line-level diff, and renders the result with added/removed line indicators. Lines unique to the first symbol appear as removals; lines unique to the second appear as additions. Shared lines render normally.
                          - paragraph [ref=e407]:
                            - text: Like
                            - code [ref=e408]: :xmldocid
                            - text: ", you can append"
                            - code [ref=e409]: ",bodyonly"
                            - text: "to compare just the bodies:"
                          - code [ref=e414]: "```csharp:xmldocid-diff,bodyonly M:MyApp.Services.OldService.Process M:MyApp.Services.NewService.Process ```"
                          - paragraph [ref=e415]: This is particularly effective for "here's what changed" sections in upgrade guides.
