            - heading "5 Breathing Techniques for Stress Relief" [level=1] [ref=e42]
            - paragraph [ref=e43]: Learn ancient pranayama techniques adapted for modern life. These five practices can be done anywhere, anytime.
            - generic [ref=e44]:
              - generic [ref=e45]: Sam Tanaka
              - generic [ref=e46]: ·
              - time [ref=e47]: March 15, 2026
              - generic [ref=e48]: ·
              - generic [ref=e49]: 5 min read
          - generic [ref=e50]:
            - paragraph [ref=e51]: Breathing is the one bodily function we do both consciously and unconsciously. That dual nature makes it a powerful bridge between mind and body — and the key to managing stress in real time.
            - paragraph [ref=e52]: Here are five techniques I teach at 937 Yoga, adapted from classical pranayama for modern practitioners.
            - heading "1. Box Breathing (Sama Vritti)" [level=2] [ref=e53]
            - paragraph [ref=e54]: Equal-part breathing is the Swiss Army knife of breathwork. Navy SEALs use it before missions. You can use it before meetings.
            - generic [ref=e55]:
              - paragraph [ref=e56]:
                - img [ref=e57]
                - text: Tip
              - paragraph [ref=e59]: Start with 4-count cycles. As you get comfortable, work up to 6 or 8 counts.
            - paragraph [ref=e60]:
              - strong [ref=e61]: "The pattern:"
            - list [ref=e62]:
              - listitem [ref=e63]: Inhale for 4 counts
              - listitem [ref=e64]: Hold for 4 counts
              - listitem [ref=e65]: Exhale for 4 counts
              - listitem [ref=e66]: Hold for 4 counts
            - paragraph [ref=e67]: Repeat for 4-8 rounds.
            - heading "2. Extended Exhale" [level=2] [ref=e68]
            - paragraph [ref=e69]: When your exhale is longer than your inhale, you activate the parasympathetic nervous system — your body's built-in calm-down switch.
            - paragraph [ref=e70]:
              - strong [ref=e71]: "The pattern:"
            - list [ref=e72]:
              - listitem [ref=e73]: Inhale for 4 counts
              - listitem [ref=e74]: Exhale for 6-8 counts
            - paragraph [ref=e75]: This is my go-to recommendation for anyone dealing with anxiety.
            - heading "3. Alternate Nostril Breathing (Nadi Shodhana)" [level=2] [ref=e76]
            - paragraph [ref=e77]: This technique balances the left and right hemispheres of the brain. It sounds esoteric, but the research backs it up — studies show it reduces blood pressure and improves focus.
            - generic [ref=e78]:
              - paragraph [ref=e79]:
                - img [ref=e80]
                - text: Note
              - paragraph [ref=e82]: If one nostril is congested, don't force it. Simply visualize the breath flowing through both sides equally.
            - paragraph [ref=e83]:
              - strong [ref=e84]: "The pattern:"
            - list [ref=e85]:
              - listitem [ref=e86]: Close right nostril with thumb, inhale through left
              - listitem [ref=e87]: Close left nostril with ring finger, exhale through right
              - listitem [ref=e88]: Inhale through right
              - listitem [ref=e89]: Close right, exhale through left
              - listitem [ref=e90]: That's one round — do 5-10
            - heading "4. Lion's Breath (Simhasana)" [level=2] [ref=e91]
            - paragraph [ref=e92]: This one looks ridiculous and that's part of the point. Lion's breath releases tension in the jaw, face, and throat — where most of us hold stress without realizing it.
            - paragraph [ref=e93]:
              - strong [ref=e94]: "The technique:"
            - list [ref=e95]:
              - listitem [ref=e96]: Inhale deeply through the nose
              - listitem [ref=e97]: Open mouth wide, stick tongue out, exhale forcefully with a "HA" sound
              - listitem [ref=e98]: "Bonus: widen your eyes"
            - generic [ref=e99]:
              - paragraph [ref=e100]:
                - img [ref=e101]
                - text: Important
              - paragraph [ref=e103]: Don't do this in a quiet office. Save it for the car, the shower, or the mat.
            - heading "5. 4-7-8 Breathing" [level=2] [ref=e104]
            - paragraph [ref=e105]: Popularized by Dr. Andrew Weil, this technique is essentially a natural tranquilizer. It's particularly effective for falling asleep.
            - paragraph [ref=e106]:
              - strong [ref=e107]: "The pattern:"
            - list [ref=e108]:
              - listitem [ref=e109]: Inhale through nose for 4 counts
              - listitem [ref=e110]: Hold for 7 counts
              - listitem [ref=e111]: Exhale through mouth for 8 counts
            - paragraph [ref=e112]: Two rounds of this and most people feel noticeably calmer.
            - separator [ref=e113]
            - heading "Finding Your Practice" [level=2] [ref=e114]
            - paragraph [ref=e115]: The best breathing technique is the one you'll actually do. Start with box breathing — it's simple, discreet, and effective. Once that feels natural, experiment with the others.
            - paragraph [ref=e116]:
              - text: I teach all of these in my
              - link "Breathwork Circle" [ref=e117] [cursor=pointer]:
                - /url: /schedule/sun-breathwork
              - text: on Sunday afternoons. Come breathe with us.
            - paragraph [ref=e118]:
              - emphasis [ref=e119]: Namaste.
