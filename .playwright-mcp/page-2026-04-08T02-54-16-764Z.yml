            - heading "5 Breathing Techniques for Stress Relief" [level=1] [ref=e44]
            - paragraph [ref=e45]: Learn ancient pranayama techniques adapted for modern life. These five practices can be done anywhere, anytime.
            - generic [ref=e46]:
              - generic [ref=e47]: Sam Tanaka
              - generic [ref=e48]: ·
              - time [ref=e49]: March 15, 2026
              - generic [ref=e50]: ·
              - generic [ref=e51]: 5 min read
          - generic [ref=e52]:
            - paragraph [ref=e53]: Breathing is the one bodily function we do both consciously and unconsciously. That dual nature makes it a powerful bridge between mind and body — and the key to managing stress in real time.
            - paragraph [ref=e54]: Here are five techniques I teach at 937 Yoga, adapted from classical pranayama for modern practitioners.
            - heading "1. Box Breathing (Sama Vritti)" [level=2] [ref=e55]
            - paragraph [ref=e56]: Equal-part breathing is the Swiss Army knife of breathwork. Navy SEALs use it before missions. You can use it before meetings.
            - generic [ref=e57]:
              - paragraph [ref=e58]:
                - img [ref=e59]
                - text: Tip
              - paragraph [ref=e61]: Start with 4-count cycles. As you get comfortable, work up to 6 or 8 counts.
            - paragraph [ref=e62]:
              - strong [ref=e63]: "The pattern:"
            - list [ref=e64]:
              - listitem [ref=e65]: Inhale for 4 counts
              - listitem [ref=e66]: Hold for 4 counts
              - listitem [ref=e67]: Exhale for 4 counts
              - listitem [ref=e68]: Hold for 4 counts
            - paragraph [ref=e69]: Repeat for 4-8 rounds.
            - heading "2. Extended Exhale" [level=2] [ref=e70]
            - paragraph [ref=e71]: When your exhale is longer than your inhale, you activate the parasympathetic nervous system — your body's built-in calm-down switch.
            - paragraph [ref=e72]:
              - strong [ref=e73]: "The pattern:"
            - list [ref=e74]:
              - listitem [ref=e75]: Inhale for 4 counts
              - listitem [ref=e76]: Exhale for 6-8 counts
            - paragraph [ref=e77]: This is my go-to recommendation for anyone dealing with anxiety.
            - heading "3. Alternate Nostril Breathing (Nadi Shodhana)" [level=2] [ref=e78]
            - paragraph [ref=e79]: This technique balances the left and right hemispheres of the brain. It sounds esoteric, but the research backs it up — studies show it reduces blood pressure and improves focus.
            - generic [ref=e80]:
              - paragraph [ref=e81]:
                - img [ref=e82]
                - text: Note
              - paragraph [ref=e84]: If one nostril is congested, don't force it. Simply visualize the breath flowing through both sides equally.
            - paragraph [ref=e85]:
              - strong [ref=e86]: "The pattern:"
            - list [ref=e87]:
              - listitem [ref=e88]: Close right nostril with thumb, inhale through left
              - listitem [ref=e89]: Close left nostril with ring finger, exhale through right
              - listitem [ref=e90]: Inhale through right
              - listitem [ref=e91]: Close right, exhale through left
              - listitem [ref=e92]: That's one round — do 5-10
            - heading "4. Lion's Breath (Simhasana)" [level=2] [ref=e93]
            - paragraph [ref=e94]: This one looks ridiculous and that's part of the point. Lion's breath releases tension in the jaw, face, and throat — where most of us hold stress without realizing it.
            - paragraph [ref=e95]:
              - strong [ref=e96]: "The technique:"
            - list [ref=e97]:
              - listitem [ref=e98]: Inhale deeply through the nose
              - listitem [ref=e99]: Open mouth wide, stick tongue out, exhale forcefully with a "HA" sound
              - listitem [ref=e100]: "Bonus: widen your eyes"
            - generic [ref=e101]:
              - paragraph [ref=e102]:
                - img [ref=e103]
                - text: Important
              - paragraph [ref=e105]: Don't do this in a quiet office. Save it for the car, the shower, or the mat.
            - heading "5. 4-7-8 Breathing" [level=2] [ref=e106]
            - paragraph [ref=e107]: Popularized by Dr. Andrew Weil, this technique is essentially a natural tranquilizer. It's particularly effective for falling asleep.
            - paragraph [ref=e108]:
              - strong [ref=e109]: "The pattern:"
            - list [ref=e110]:
              - listitem [ref=e111]: Inhale through nose for 4 counts
              - listitem [ref=e112]: Hold for 7 counts
              - listitem [ref=e113]: Exhale through mouth for 8 counts
            - paragraph [ref=e114]: Two rounds of this and most people feel noticeably calmer.
            - separator [ref=e115]
            - heading "Finding Your Practice" [level=2] [ref=e116]
            - paragraph [ref=e117]: The best breathing technique is the one you'll actually do. Start with box breathing — it's simple, discreet, and effective. Once that feels natural, experiment with the others.
            - paragraph [ref=e118]:
              - text: I teach all of these in my
              - link "Breathwork Circle" [ref=e119] [cursor=pointer]:
                - /url: /schedule/sun-breathwork
              - text: on Sunday afternoons. Come breathe with us.
            - paragraph [ref=e120]:
              - emphasis [ref=e121]: Namaste.
