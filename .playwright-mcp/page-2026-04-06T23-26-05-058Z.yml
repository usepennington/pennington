                  - text: "-- For"
                  - code [ref=e322]: bash
                  - text: and
                  - code [ref=e323]: shell
                  - text: code blocks, a built-in
                  - code [ref=e324]: ShellHighlighter
                  - text: handles command and option highlighting.
