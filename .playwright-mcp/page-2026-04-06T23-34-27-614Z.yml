                - generic [ref=e126]:
                  - text: "## Create a New Project"
                  - paragraph [ref=e127]: Start with an empty ASP.NET project. Penn doesn't need Blazor templates or MVC scaffolding — it brings what it needs.
                  - code [ref=e132]:
                    - generic [ref=e133]: dotnet new web -n MyDocsSite
                    - generic [ref=e134]: cd MyDocsSite
                - generic [ref=e135]:
                  - text: "## Add Penn.DocSite"
