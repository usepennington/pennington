            - main [ref=e110]:
              - paragraph [ref=e111]: Penn is opinionated, inflexible, and sufficient to the purpose. It will not try to be everything to everyone. It will, however, build you a perfectly serviceable content site with minimal ceremony — and that's what we're doing here.
              - paragraph [ref=e112]: By the end of this tutorial, you'll have a working site that serves markdown content in dev mode and generates static HTML when you ask nicely.
              - heading "What You'll Build" [level=2] [ref=e113]
              - paragraph [ref=e114]: "A documentation-style site with:"
              - list [ref=e115]:
                - listitem [ref=e116]: Markdown content rendered to pages
                - listitem [ref=e117]: YAML front matter for metadata
                - listitem [ref=e118]: Live reload in development
                - listitem [ref=e119]: Static output for deployment
              - heading "Prerequisites" [level=2] [ref=e120]
              - list [ref=e121]:
                - listitem [ref=e122]: .NET 11 SDK or later
                - listitem [ref=e123]: A code editor you have opinions about
                - listitem [ref=e124]: A terminal
