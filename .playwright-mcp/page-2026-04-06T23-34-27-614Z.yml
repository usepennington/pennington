                    - text: Penn ships as a few focused packages.
                    - code [ref=e137]: Penn.DocSite
                    - text: is the batteries-included option for documentation sites — it pulls in the core engine, UI components, and a MonorailCSS-based design.
                  - code [ref=e142]:
                    - generic [ref=e143]: dotnet add package Penn.DocSite --prerelease
                  - paragraph [ref=e144]: One package. One line. Penn has opinions about what you need, and this is most of it.
                  - generic [ref=e145]:
